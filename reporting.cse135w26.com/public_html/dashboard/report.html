<div class="report-page">

  <div class="header">
    <h1>Performance Report</h1>
    <div class="date-controls">
      <label for="startDate">From</label>
      <input type="date" id="startDate">
      <label for="endDate">To</label>
      <input type="date" id="endDate">
      <button id="loadBtn">Load</button>
    </div>
  </div>

  <div class="container">
    <div id="errorBox" class="error-msg"></div>

    <div class="cards">
      <div class="card" id="lcpCard"><div class="label">LCP (p75)</div><div class="value" id="lcpValue">&mdash;</div><div class="rating" id="lcpRating">Loading...</div></div>
      <div class="card" id="clsCard"><div class="label">CLS (p75)</div><div class="value" id="clsValue">&mdash;</div><div class="rating" id="clsRating">Loading...</div></div>
      <div class="card" id="inpCard"><div class="label">INP (p75)</div><div class="value" id="inpValue">&mdash;</div><div class="rating" id="inpRating">Loading...</div></div>
    </div>

    <div class="panel">
      <h2>Per-Page Performance</h2>
      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th>URL</th>
              <th>Avg Load (ms)</th>
              <th>Avg TTFB (ms)</th>
              <th>Avg LCP (ms)</th>
              <th>Avg CLS</th>
              <th>Samples</th>
            </tr>
          </thead>
          <tbody id="perfBody">
            <tr><td colspan="6" class="empty-state">Loading performance data...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

</div>
