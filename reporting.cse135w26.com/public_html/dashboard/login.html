<!DOCTYPE html>
<!--Majority of code from login.html cse135 site-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In - Analytics Dashboard</title>
<style>
    body {
        font-family: sans-serif;
        background:#f0f2f5;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
    }
    form {
        background:white;
        padding:40px;
        border-radius:8px;
        box-shadow:0 2px 8px rgba(0,0,0,0.12);
        width:100%;
        max-width:400px;
        position:relative;
    }
    .brand-bar {
        width:100%;
        height:4px;
        background:#2E86C1;
        border-radius:8px 8px 0 0;
        position:absolute;
        top:0;
        left:0;
    }
    header {
        text-align:center;
        margin-bottom:20px;
    }
    header h1 {
        color:#333;
        font-size:1.5em;
        margin-bottom:4px;
    }
    header .subtitle {
        color:#888;
        font-size:0.9em;
    }
    label {
        display:block;
        font-size:0.85em;
        font-weight:600;
        color:#555;
        margin-bottom:6px;
    }
    input {
        width:100%;
        padding:10px 12px;
        border:1px solid #d0d0d0;
        border-radius:4px;
        font-size:1em;
        margin-bottom:20px;
    }
    input:focus {
        outline:none;
        border-color:#2E86C1;
        box-shadow:0 0 0 3px rgba(46,134,193,0.15);
    }
    .error {
        background:#fdf0f0;
        color:#c0392b;
        border:1px solid #e6b0aa;
        border-radius:4px;
        padding:10px 12px;
        font-size:0.9em;
        margin-bottom:20px;
    }
    button {
        width:100%;
        padding:12px;
        background:#2E86C1;
        color:white;
        border:none;
        border-radius:4px;
        font-size:1em;
        font-weight:600;
        cursor:pointer;
    }
    button:hover { background:#2471a3; }
</style>
</head>
<body>
    <form id="login-form" action="login.php" method="POST">
	<p id="error-msg" class="error" hidden></p>
        <div class="brand-bar"></div>

        <header>
            <h1>Analytics Dashboard</h1>
            <p class="subtitle">Sign in to view your reports</p>
        </header>

        <label for="username">Username</label>
        <input type="text" id="username" name="username" required placeholder="Enter username">

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Enter password">

        <button type="submit">Sign In</button>
    </form>

    <script>
    (function() {
    	'use strict';

    	const form = document.getElementById('login-form');
    	const errorDiv = document.getElementById('error-msg');
    	const submitBtn = form.querySelector('button[type="submit"]');

    	form.addEventListener('submit', async (e) => {
        	e.preventDefault();                 // prevent normal form submission
       		errorDiv.hidden = true;             // hide previous errors
        	submitBtn.disabled = true;          // disable button while processing
        	submitBtn.textContent = 'Signing in...';

        	const username = document.getElementById('username').value;
        	const password = document.getElementById('password').value;
                
		try {
           		const res = await fetch('login.php', {
                		method: 'POST',
                		headers: { 'Content-Type': 'application/json' },
                		body: JSON.stringify({ username, password }),
                		credentials: 'include'
            		});

            		const data = await res.json();

            		if (res.ok && data.success) {
                 		window.location.href = 'dashboard.php';
            		} else {
                		errorDiv.textContent = 'Invalid username or password.';
                		errorDiv.hidden = false;
                		submitBtn.disabled = false;
                		submitBtn.textContent = 'Sign In';
            		}

        	} catch (err) {
            		errorDiv.textContent = 'Network error. Please try again.';
            		errorDiv.hidden = false;
            		submitBtn.disabled = false;
            		submitBtn.textContent = 'Sign In';
            		console.error(err);
        	}
    	});
    })();
</script>
</body>
</html>
